name: Deploy Standing Together via FTP

on:
  push:
    branches:
      - master

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      # 4️⃣ Build frontend
      - name: Build React frontend
        run: npm run build
        working-directory: ./frontend

      # 5️⃣ Deploy frontend via FTP (sync)
      - name: Deploy frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/
          server-dir: /home/basagypb/frontend/
          dry-run: false
        # حذف الملفات القديمة غير الموجودة على GitHub

      # 6️⃣ Deploy backend via FTP (sync)
      - name: Deploy backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /home/basagypb/backend/
          dry-run: false
 