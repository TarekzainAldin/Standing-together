name: Deploy Standing Together via SSH

on:
  push:
    branches:
      - master

jobs:
  ssh-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3️⃣ Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps
        working-directory: ./frontend

      # 4️⃣ Build frontend
      - name: Build React frontend
        run: npm run build
        working-directory: ./frontend

      # 5️⃣ Deploy via SSH/SCP
      - name: Deploy via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}          # IP السيرفر
          username: ${{ secrets.VPS_USER }}      # اسم المستخدم
          key: ${{ secrets.VPS_SSH_KEY }}        # مفتاح الـ SSH (private key)
          port: ${{ secrets.VPS_SSH_PORT }}      # رقم البورت (مثلاً 21098)
          source: "./frontend/dist/,./backend/"  # الملفات أو المجلدات التي تريد رفعها
          target: "/home/basagypb/"             # المسار على السيرفر